{% extends "trang_chu/base.html" %}
{% load static %}
{% block content %}
<h3>内容確認・承認</h3>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">承認する</button>
    <a href="{% url 'task_code_detail' task_code.id %}" class="btn btn-secondary">キャンセル</a>
</form>
<script defer src="{% static 'quet_anh/js/stage_audio.js' %}"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
    if (window.QAStageAudio) {
        window.QAStageAudio.bindToggle();
    }
    document.querySelectorAll('form').forEach(function (formEl) {
        formEl.addEventListener('submit', function () {
            window.QAStageAudio?.play('submit_start');
        });
    });
    document.querySelectorAll('a.btn-secondary').forEach(function (btn) {
        btn.addEventListener('click', function () {
            window.QAStageAudio?.play('mode_select');
        });
    });
});
</script>
{% endblock %}
