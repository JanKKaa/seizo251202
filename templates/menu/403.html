<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>403 Forbidden</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow border-0 text-center">
                <div class="card-body py-5">
                    <h1 class="display-1 text-danger"><i class="fas fa-ban"></i> 403</h1>
                    <h2 class="mb-4 text-dark">アクセスが拒否されました</h2>
                    <p class="lead mb-4">申し訳ありませんが、このページにアクセスする権限がありません。<br>
                        管理者のみ操作可能です。</p>
                    <a href="{% url 'menu:list' %}" class="btn btn-primary btn-lg">
                        <i class="fas fa-home"></i> メニューに戻る
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
