<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>注文編集</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>注文編集</h2>
    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label for="ngay_giao" class="form-label">配達日</label>
            <input type="date" id="ngay_giao" name="ngay_giao" class="form-control" value="{{ order.ngay_giao|date:'Y-m-d' }}" required>
        </div>
        <div class="mb-3">
            <label for="so_luong" class="form-label">数量</label>
            <input type="number" id="so_luong" name="so_luong" class="form-control" value="{{ order.so_luong }}" min="1" required>
        </div>
        <div class="mb-3">
            <label for="ghi_chu" class="form-label">備考</label>
            <textarea id="ghi_chu" name="ghi_chu" class="form-control">{{ order.ghi_chu }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary">保存</button>
        <a href="{% url 'menu:order_history' %}" class="btn btn-secondary">戻る</a>
    </form>
</div>
</body>
</html>
