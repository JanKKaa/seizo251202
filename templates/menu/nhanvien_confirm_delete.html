<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>社員削除確認</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <div class="card">
        <div class="card-header bg-danger text-white">
            <h4 class="mb-0"><i class="fas fa-user-times"></i> 社員削除確認</h4>
        </div>
        <div class="card-body">
            <p>本当に社員 <strong>{{ nhanvien.ten }}</strong>（社員番号: {{ nhanvien.ma_so }}）を削除しますか？</p>
            <form method="post">
                {% csrf_token %}
                <a href="{% url 'menu:nhanvien_list' %}" class="btn btn-secondary">キャンセル</a>
                <button type="submit" class="btn btn-danger">削除</button>
            </form>
        </div>
    </div>
</div>
<!-- FontAwesome CDN nếu cần -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/js/all.min.js"></script>
</body>
</html>
