<style>
  /* Gadget weather card in header */
  .header-gadget {
    display:flex; align-items:center; gap:4px;                 /* trước 6px */
    background: linear-gradient(135deg, rgba(255,255,255,.18), rgba(255,255,255,.06));
    border: 1px solid rgba(255,255,255,.35);
    border-radius: 8px;
    padding: 2px 4px;                                          /* trước 3px 6px */
    color:#fff !important;
    backdrop-filter: blur(6px);
    box-shadow: 0 3px 8px -6px rgba(0,0,0,.28);
  }
  .header-gadget .icon {
    font-size: .65rem; width: 16px; text-align:center;         /* nhỏ hơn chút */
  }
  .header-gadget .data {
    display:flex; flex-direction:column; line-height:1.1;
  }
  .header-gadget .top {
    display:flex; align-items:center; gap:4px; font-weight:700;
  }
  .header-gadget .temp { font-size:.65rem; }
  .header-gadget .city { font-size:.55rem; }
  .header-gadget .bottom {
    display:flex; align-items:center; gap:4px; font-size:.72rem; opacity:.85; /* trước .78rem */
  }
  .header-gadget .sep { padding: 0 3px; }

  .dashboard-header-title, .dashboard-header-title * {
    text-shadow:0 1px 2px rgba(0,0,0,.35);
    font-weight:700; letter-spacing:.03rem; white-space:nowrap;
    font-size:.9rem;                                           /* thêm: thu nhỏ chữ tiêu đề */
  }
  .brand-logo img { height:20px; transition:.25s; }            /* trước 28px */
  .brand-logo img:hover { transform:scale(0.7); }

  /* Thu nhỏ trên màn hẹp */
  @media (max-width: 900px) {
    .dashboard-header-title { font-size:.8rem; }
    .header-gadget { gap:3px; padding:2px 4px; font-size:.75rem; }
    .header-gadget .city { display:none; }
    .header-gadget .bottom { gap:3px; font-size:.7rem; }
  }

  .header-wrap {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 6px; height: 44px; gap: 8px;                    /* giảm padding + height + gap */
  }
  .header-left { display: flex; align-items: center; gap: 6px; flex:1 1 auto; min-width:0; }
  .header-right { display: flex; align-items: center; gap: 8px; flex:0 0 auto; }

  /* Nút header nhỏ gọn */
  #switchScreenBtn,
  #theme-toggle-btn {
    --btn-h: 20px;
    height: var(--btn-h);
    padding: 1px 6px;
    font-size: .5rem;
    line-height: 1;
    border-radius: 8px;

    background: linear-gradient(135deg, rgba(255,255,255,.18), rgba(255,255,255,.06));
    border: 1px solid rgba(255,255,255,.35);
    color: #fff;
    backdrop-filter: blur(6px);
    box-shadow: 0 3px 8px -6px rgba(0,0,0,.28);
    transition: transform .15s ease, box-shadow .2s ease, border-color .2s ease;
  }
  #switchScreenBtn i,
  #theme-toggle-btn i {
    font-size: .75rem;
  }



  /* Trên màn rất hẹp, thu nhỏ thêm */
  @media (max-width: 900px) {
    #switchScreenBtn,
    #theme-toggle-btn {
      --btn-h: 20px;
      padding: 1px 5px;
      font-size: .45rem;
      border-radius: 7px;
      backdrop-filter: blur(5px);
    }
    #switchScreenBtn i,
    #theme-toggle-btn i {
      font-size: .65rem;
    }
  }

  .brand-logo .logo-svg { height:30px; width:auto; transition:.25s; }
  .brand-logo .logo-svg:hover { transform:scale(1); }

  #switchScreenBtn {
  background: transparent !important;
  border: none !important;
  box-shadow: none !important;
  padding: 0 !important;
  height: auto !important;
  }

  #sleepTestBtn {
    --btn-h: 20px;
    height: var(--btn-h);
    padding: 1px 6px;
    font-size: .5rem;
    line-height: 1;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.35);
    color: #fff;
  }

</style>

<script>
  const LAT = 35.989, LON = 137.981; // Minowa, Nagano
  const CURRENT_URL = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code&timezone=Asia%2FTokyo`;
  const HOURLY_URL  = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&hourly=temperature_2m,precipitation,snowfall,weather_code&timezone=Asia%2FTokyo`;

  const iconMap = (code) => {
    const c = Number(code);
    if (c===0) return 'fa-sun';
    if ([1,2].includes(c)) return 'fa-cloud-sun';
    if (c===3) return 'fa-cloud';
    if ([45,48].includes(c)) return 'fa-smog';
    if ([51,53,55,56,57,80,81,82].includes(c)) return 'fa-cloud-showers-heavy';
    if ([61,63,65,66,67].includes(c)) return 'fa-cloud-rain';
    if ([71,73,75,77,85,86].includes(c)) return 'fa-snowflake';
    if ([95,96,99].includes(c)) return 'fa-bolt';
    return 'fa-cloud-sun';
  };
  const descMap = (code) => {
    const m = {
      0:'快晴',1:'晴れ',2:'一時曇り',3:'曇り',
      45:'霧',48:'霧氷',
      51:'弱い霧雨',53:'霧雨',55:'強い霧雨',56:'弱い着氷霧雨',57:'強い着氷霧雨',
      61:'弱い雨',63:'雨',65:'強い雨',66:'弱い着氷雨',67:'強い着氷霧雨',
      71:'弱い雪',73:'雪',75:'強い雪',77:'雪結晶',
      80:'にわか雨',81:'雨',82:'激しい雨',
      85:'にわか雪',86:'激しい雪',
      95:'雷雨',96:'雷雨(雹)',99:'激しい雷雨(雹)'
    };
    return m[Number(code)] ?? '—';
  };

  async function loadCurrent() {
    try {
      const r = await fetch(CURRENT_URL, { cache: 'no-store' });
      const d = await r.json();
      const cur = d.current || {};
      const temp = Math.round(cur.temperature_2m ?? 0);
      const hum = Math.round(cur.relative_humidity_2m ?? 0);
      const wind = Math.round(cur.wind_speed_10m ?? 0);
      const wcode = cur.weather_code ?? 3;
      const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      document.getElementById('wgTemp').textContent = `${temp}°C`;
      document.getElementById('wgCity').textContent = 'Minowa, Nagano';
      document.getElementById('wgCond').textContent = descMap(wcode);
      document.getElementById('wgHum').textContent = `湿度 ${hum}%`;
      document.getElementById('wgWind').textContent = `風 ${wind} m/s`;
      document.getElementById('wgUpdated').textContent = `更新 ${time}`;
      document.getElementById('wgIcon').innerHTML = `<i class="fas ${iconMap(wcode)}"></i>`;
    } catch {
      document.getElementById('wgCond').textContent = 'データ取得不可';
    }
  }

  function nearestIndexTo1730Today(times) {
    const JSToffset = 9 * 60 * 60 * 1000;
    const now = new Date();
    const target = new Date(now);
    target.setHours(17,30,0,0);
    let bestIdx = -1, bestDiff = Infinity;
    for (let i=0;i<times.length;i++){
      const t = new Date(times[i]);              // ISO -> Date (UTC)
      const tJST = new Date(t.getTime() + JSToffset); // xem theo JST
      if (tJST.getFullYear()===target.getFullYear() &&
          tJST.getMonth()===target.getMonth() &&
          tJST.getDate()===target.getDate()) {
        const diff = Math.abs(tJST - target);
        if (diff < bestDiff) { bestDiff = diff; bestIdx = i; }
      }
    }
    return bestIdx; // có thể là 17:00 hoặc 18:00 nếu không có 17:30
  }

  async function loadForecast1730() {
    try {
      const r = await fetch(HOURLY_URL, { cache: 'no-store' });
      const d = await r.json();
      const hourly = d.hourly || {};
      const times = hourly.time || [];
      let idx = nearestIndexTo1730Today(times);
      if (idx === -1) throw new Error('今日の近傍時刻なし');

      const temp = Math.round(hourly.temperature_2m[idx] ?? 0);
      const rain = (hourly.precipitation[idx] ?? 0); // mm
      const snow = (hourly.snowfall[idx] ?? 0);      // cm
      const wcode = hourly.weather_code[idx] ?? 3;

      // Nhãn thời gian thực tế từ API (hiển thị theo JST, HH:mm)
      const t = new Date(times[idx]);
      const tJST = new Date(t.getTime() + 9*60*60*1000);
      const label = `今日 ${tJST.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;

      const timeEl = document.querySelector('#forecast1730 .time');
      const fcTemp = document.getElementById('fcTemp');
      const fcRain = document.getElementById('fcRain');
      const fcSnow = document.getElementById('fcSnow');
      const fcCond = document.getElementById('fcCond');
      if (!timeEl || !fcTemp || !fcRain || !fcSnow || !fcCond) return;

      timeEl.textContent = label;
      fcTemp.textContent = `${temp}°C`;
      fcRain.textContent = `雨 ${rain} mm`;
      fcSnow.textContent = `雪 ${snow} cm`;
      fcCond.textContent = descMap(wcode);
    } catch {
      const timeEl = document.querySelector('#forecast1730 .time');
      const fcCond = document.getElementById('fcCond');
      if (timeEl) timeEl.textContent = '今日 17:30';
      if (fcCond) fcCond.textContent = '予報取得不可';
    }
  }

  function refreshAll(){
    loadCurrent();       // thời tiết hiện tại
    loadForecast1730();  // dự báo mốc gần 17:30 hôm nay
  }
  refreshAll();
  setInterval(refreshAll, 5 * 60 * 1000); // cập nhật mỗi 5 phút
</script>
