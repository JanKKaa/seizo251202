{% extends "trang_chu/base.html" %}
{% block content %}
<h2><span class="badge bg-primary me-2">生産計画</span>NITTEI（CSV）</h2>

<div class="mb-3 d-flex gap-2">
    <a href="{% url 'iot:iot_index' %}" class="btn btn-outline-secondary">
        <i class="fa-solid fa-arrow-left"></i> 戻る
    </a>
    <a href="{% url 'iot:upload_material_plan' %}" class="btn btn-outline-success">
        <i class="fa-solid fa-boxes-stacked"></i> ZAIRYOSIYOKEIKAKUファイル
    </a>
    <a href="{% url 'iot:production_plan_status' %}" class="btn btn-outline-primary">
        <i class="fa-solid fa-table-list"></i> 計画一覧へ
    </a>
</div>

<div class="alert alert-primary d-flex align-items-center gap-3">
  <i class="fa-solid fa-industry fa-2x text-primary"></i>
  <div>
    <p class="mb-1 fw-bold">生産管理システム　01.発注～出荷　2.日程示　処理区分7₌CSV</p>
    
  </div>
</div>

<form method="post" enctype="multipart/form-data" class="card p-4 shadow-sm border border-primary">
  {% csrf_token %}
  <div class="mb-3">
    <label class="form-label d-flex align-items-center gap-2">
      <span class="badge bg-primary">生産</span>NITTEIファイル
    </label>
    <input type="file" name="csv_file" accept=".csv" class="form-control" required>
  </div>
  <div class="d-flex justify-content-between">
    <button type="submit" class="btn btn-primary">
      <i class="fa-solid fa-upload me-1"></i> アップロード
    </button>
    
  </div>
</form>


{% endblock %}
