{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>{% block title %}成形機ダッシュボード{% endblock %}</title>

  <!-- Vendor CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@5.15.4/css/all.min.css">

  <!-- App CSS -->
  <link rel="stylesheet" href="{% static 'iot/css/dashboard.css' %}">
  {% block extra_head %}{% endblock %}
</head>
<body>
  {% block content %}{% endblock %}

  <!-- Vendor JS -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>

  <!-- App JS (thứ tự quan trọng) -->
  <script src="{% static 'iot/js/utils.js' %}"></script>
  <script src="{% static 'iot/js/render.js' %}"></script>
  <script src="{% static 'iot/js/scale.js' %}"></script>
  <script src="{% static 'iot/js/applyData.js' %}"></script>
  <script src="{% static 'iot/js/offline_merge.js' %}"></script>
  <script src="{% static 'iot/js/polling.js' %}"></script>
  <script src="{% static 'iot/js/main.js' %}"></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
