{% extends "trang_chu/base.html" %}

{% block title %}申請{% endblock %}

{% block content %}
<div class="container-fluid mt-4">
    <!-- Page Heading -->
    <h1 class="h3 mb-4 text-gray-800">新規</h1>

    <!-- Form Card -->
    <div class="card shadow mb-4">
        <div class="card-header py-3">
            <h6 class="m-0 font-weight-bold text-primary">ドキュメント情報</h6>
        </div>
        <div class="col-lg-4">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="form-group">
                    {{ form.as_p }}
                </div>
                <button type="submit" class="btn btn-primary btn-icon-split btn-s">
                    <span class="icon text-white-50">
                        <i class="fas fa-plus"></i>
                    </span>
                    <span class="text">申請</span>
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
