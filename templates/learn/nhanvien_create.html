{% extends "learn/base_learn.html" %}
{% block content %}
<div class="container-fluid">
    <h1 class="h3 mb-4 text-gray-800">{{ title }}</h1>
    <div class="card shadow mb-4">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label for="{{ form.ma_so.id_for_label }}">社員番号</label>
                    {{ form.ma_so }}
                </div>
                <div class="form-group">
                    <label for="{{ form.ten.id_for_label }}">氏名</label>
                    {{ form.ten }}
                </div>
                <div class="form-group">
                    <label for="{{ form.email.id_for_label }}">メール</label>
                    {{ form.email }}
                </div>
                <div class="form-group">
                    <label for="{{ form.chuc_vu.id_for_label }}">役職</label>
                    {{ form.chuc_vu }}
                </div>
                <div class="form-group">
                    <label for="{{ form.supervisor.id_for_label }}">上司</label>
                    {{ form.supervisor }}
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
            </form>
        </div>
    </div>
</div>

{% if messages %}
  <div class="container" style="max-width: 600px;">
    {% for message in messages %}
      <div class="alert alert-{{ message.tags }} alert-dismissible fade show mb-2" role="alert" style="word-break:break-word; white-space:pre-line;">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
    {% endfor %}
  </div>
{% endif %}
{% endblock %}
