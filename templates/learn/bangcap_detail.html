{% extends "learn/base_learn.html" %}
{% block title %}資格証明書詳細{% endblock %}
{% block content %}
<div class="container" style="max-width: 600px;">
    <h2 class="mb-4">資格証明書詳細</h2>
    <dl class="row">
        <dt class="col-sm-4">資格の種類</dt>
        <dd class="col-sm-8">{{ bangcap.loai_bang }}</dd>
        <dt class="col-sm-4">級</dt>
        <dd class="col-sm-8">{{ bangcap.cap_do }}</dd>
        <dt class="col-sm-4">証明書ファイル</dt>
        <dd class="col-sm-8">
            <a href="{{ bangcap.file.url }}" target="_blank" class="btn btn-primary btn-sm">ダウンロード</a>
        </dd>
        <dt class="col-sm-4">発行日</dt>
        <dd class="col-sm-8">{{ bangcap.ngay_cap }}</dd>
        <dt class="col-sm-4">備考</dt>
        <dd class="col-sm-8">{{ bangcap.ghi_chu }}</dd>
    </dl>
    <a href="{% url 'learn:bangcap_list' %}" class="btn btn-secondary">戻る</a>
</div>
{% endblock %}
