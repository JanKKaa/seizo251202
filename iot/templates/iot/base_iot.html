<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>{% block title %}IoT Device Management{% endblock %}</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --bg-body:#f5f6f8;
      --bg-card:#ffffff;
      --text:#222;
      --nav-bg:#212529;
      --border:#dee2e6;
    }
    body.dark {
      --bg-body:#121417;
      --bg-card:#1e2227;
      --text:#e6e6e6;
      --nav-bg:#0d1114;
      --border:#2d3238;
    }
    body { background:var(--bg-body); color:var(--text); }
    .card { background:var(--bg-card); border-color:var(--border); }
    .table, .table td, .table th { color:var(--text); }
    .navbar { background:var(--nav-bg)!important; }
    .dark-toggle-btn { cursor:pointer; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body class="{% if request.COOKIES.theme == 'dark' %}dark{% endif %}">
<nav class="navbar navbar-dark navbar-expand-lg mb-3">
  <div class="container-fluid">
    <a class="navbar-brand" href="{% url 'iot:device_list' %}">Devices</a>
    <div class="d-flex gap-2">
      <button id="themeToggle" class="btn btn-sm btn-outline-light dark-toggle-btn" type="button">
        <span class="light-label">Dark</span>
        <span class="dark-label d-none">Light</span>
      </button>
      <a class="btn btn-sm btn-outline-light" href="{% url 'iot:device_create' %}">+ New</a>
      <a class="btn btn-sm btn-outline-warning" href="{% url 'iot:device_bulk_import' %}">Import</a>
    </div>
  </div>
</nav>
<div class="container">
  {% if messages %}
    {% for m in messages %}
      <div class="alert alert-{{ m.tags }} py-2">{{ m }}</div>
    {% endfor %}
  {% endif %}
  {% block content %}{% endblock %}
</div>
<script>
(function(){
  const btn = document.getElementById('themeToggle');
  if(!btn) return;
  function apply(mode){
    document.body.classList.toggle('dark', mode==='dark');
    document.cookie = 'theme='+mode+';path=/;max-age=31536000';
    btn.querySelector('.light-label').classList.toggle('d-none', mode==='dark');
    btn.querySelector('.dark-label').classList.toggle('d-none', mode!=='dark');
  }
  const saved = (document.cookie.split(';').map(s=>s.trim()).find(x=>x.startsWith('theme='))||'').split('=')[1] ||
                (localStorage.getItem('theme') || '');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  apply(saved || (prefersDark ? 'dark':'light'));
  btn.addEventListener('click', ()=>{
    const next = document.body.classList.contains('dark') ? 'light':'dark';
    localStorage.setItem('theme', next);
    apply(next);
  });
})();
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
